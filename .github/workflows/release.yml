name: Release

on:
  # `v` で始まるタグを push すると起動 (例: `git tag v0.4.0 && git push --tags`)。
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ----------------------------------------------------------------- #
  # CI: workspace のテスト
  # ----------------------------------------------------------------- #
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  # ----------------------------------------------------------------- #
  # crates.io 公開 (core → ライブラリ/バイナリの順)
  # ----------------------------------------------------------------- #
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: crates-io
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish user-permission-core
        run: cargo publish -p user-permission-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish user-permission
        run: cargo publish -p user-permission --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  # ----------------------------------------------------------------- #
  # バイナリ配布 (user-permission CLI)
  # ----------------------------------------------------------------- #
  binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p user-permission --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/user-permission-${{ matrix.target }}.tar.gz user-permission
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          Compress-Archive -Path target/${{ matrix.target }}/release/user-permission.exe -DestinationPath dist/user-permission-${{ matrix.target }}.zip
        shell: pwsh
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
