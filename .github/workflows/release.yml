name: Release

on:
  # `v` で始まるタグを push すると起動 (例: `git tag v0.1.1 && git push --tags`)。
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ----------------------------------------------------------------- #
  # 1. workspace のテスト
  # ----------------------------------------------------------------- #
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  # ----------------------------------------------------------------- #
  # 2. バイナリビルド (artifact として保存)
  # ----------------------------------------------------------------- #
  binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p user-permission --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/user-permission-${{ matrix.target }}.tar.gz user-permission
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          Compress-Archive -Path target/${{ matrix.target }}/release/user-permission.exe -DestinationPath dist/user-permission-${{ matrix.target }}.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/*

  # ----------------------------------------------------------------- #
  # 3. 全バイナリを集約して GitHub Release を作成
  # ----------------------------------------------------------------- #
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # ----------------------------------------------------------------- #
  # 4. crates.io 公開 (Release が成功した後のみ)
  # ----------------------------------------------------------------- #
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish user-permission-core
        run: cargo publish -p user-permission-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish user-permission
        run: cargo publish -p user-permission --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
